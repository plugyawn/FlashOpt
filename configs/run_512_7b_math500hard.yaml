# =============================================================================
# RandOpt Speedrun — 512-seed, Qwen2.5-7B on 1x H100-80GB, graphs ON
# HARDER task: MATH-500 levels 4-5 only (the hardest subset), where a 7B base has
# real headroom (~40-55%) — vs GSM8K where 7B was ~89% (near-saturated). Same
# model/hardware/population as run_512_7b_h100 so the only changed variable is
# task difficulty. Proper held-out FineWeb bpb. Run detached (`--tier math512`).
# =============================================================================
name: run_512_7b_math500hard

hardware:
  gpus: 1
  gpu: "H100-80GB"
  nodes: 1

model: Qwen/Qwen2.5-7B-Instruct
precision: bfloat16

tensor_parallel_size: 1
num_engines: 1
gpu_memory_utilization: 0.65     # 7B + resident base copy + CUDA-graph pools
enforce_eager: false             # CUDA graphs ON (validated on 7B/H100)
max_num_seqs: 512
max_model_len: 4096              # MATH CoT is long; room for 2048-tok prompts+gen

noise: rademacher
kernel: auto

# ---- selection task: MATH-500, hardest levels --------------------------------
dataset: math500
# disjoint train/test produced by scripts/make_math500_hard.py --levels 4 5
train_data_path: data/math-500-hard/train.jsonl
test_data_path: data/math-500-hard/test.jsonl
train_samples: 64                # only ~260 problems at levels 4-5 -> keep train
test_samples: 192                # small so test can be larger; 64+192=256 fits
max_tokens: 2048                 # MATH-500 needs long step-by-step solutions
population_size: 512
sigma_values: [0.0005, 0.001, 0.002]
top_k_ratios: [0.02, 0.05]
global_seed: 42

probe_top: 5

fineweb:
  path: eval/fineweb_heldout.jsonl
  max_len: 2048                  # clamped to max_model_len-2 automatically
  max_chunks: 256
  ensemble: true
  build_if_missing: true
  build_num_docs: 256
